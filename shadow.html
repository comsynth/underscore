<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Underscore Shadow</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;
  cursor: none;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(
      circle at var(--x, 30%) var(--y, 30%),
      rgba(255,255,255,.45) 0%,
      rgba(255,255,255,.18) 10%,
      rgba(255,255,255,.05) 24%,
      rgba(0,0,0,.82) 55%,
      rgba(0,0,0,.95) 100%
    );
  pointer-events: none;
  z-index: 5;
  mix-blend-mode: screen;
}

.page {
  min-height: 100vh;
  padding: 48px;
  position: relative;
}

.brand {
  letter-spacing: .35em;
  font-size: 28px;
  margin-bottom: 12px;
}

.sub {
  font-size: 16px;
  opacity: .8;
}

.nav {
  margin-top: 60px;
  line-height: 1.8;
  font-size: 16px;
}

.hero-logo {
  position: absolute;
  left: 50%;
  top: 48%;
  width: 620px;
  max-width: 70vw;
  transform: translate(-50%, -50%);
}

.logo-wrap {
  position: relative;
  width: 100%;
}

.logo-shadow,
.logo-main {
  display: block;
  width: 100%;
}

.logo-shadow {
  position: absolute;
  inset: 0;
  z-index: 1;
  opacity: .85;
  filter: brightness(0);
  transform:
    translate(
      calc(var(--shadow-x, 80px) * 1),
      calc(var(--shadow-y, 80px) * 1)
    )
    skew(
      calc(var(--shadow-skew, -8deg) * 1),
      calc(var(--shadow-skew-y, 2deg) * 1)
    )
    scale(1.25, 1.08);
  transform-origin: center;
  filter: brightness(0) blur(2px);
}

.logo-main {
  position: relative;
  z-index: 2;
  filter:
    drop-shadow(0 0 8px rgba(75,111,138,.5))
    drop-shadow(0 8px 10px rgba(0,0,0,.7));
}

.cursor-light {
  position: fixed;
  left: var(--x, 30%);
  top: var(--y, 30%);
  width: 16px;
  height: 16px;
  border: 1px solid #4B6F8A;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 10;
}

.caption {
  position: absolute;
  left: 48px;
  bottom: 64px;
  max-width: 360px;
  opacity: .75;
  line-height: 1.6;
}

.player {
  position: absolute;
  right: 48px;
  bottom: 48px;
  font-size: 16px;
  letter-spacing: .12em;
}
</style>

<link rel="stylesheet" href="css/styles.css">

<style>

.logo-shadow {
  position: absolute;
  inset: 0;
  z-index: 1;
  opacity: .10;
  filter: brightness(0);

  animation: shadowDrift 18s ease-in-out infinite alternate;
}

@keyframes shadowDrift {
  0% {
    transform: translate(6px, 6px);
  }

  25% {
    transform: translate(8px, 7px);
  }

  50% {
    transform: translate(10px, 9px);
  }

  75% {
    transform: translate(8px, 11px);
  }

  100% {
    transform: translate(7px, 10px);
  }
}

</style>

</head>

<body>
  <div class="cursor-light"></div>

  <main class="page">
    <div class="brand">UNDERSCORE</div>
    <div class="sub">retro moving shadow demo</div>

    <nav class="nav">
      01 &nbsp; home<br>
      02 &nbsp; music<br>
      03 &nbsp; colors<br>
      04 &nbsp; about<br>
      05 &nbsp; contact
    </nav>

    <section class="hero-logo">
      <div class="logo-wrap">
        <img src="images/block_logo.svg" class="logo-shadow" alt="">
        <img src="images/block_logo.svg" class="logo-main" alt="Block logo">
      </div>
    </section>

    <div class="caption">
      <strong>RETRO MOVING SHADOW</strong><br>
      Move your mouse around the screen.<br>
      The cursor acts as a flashlight.<br>
      The logo casts a long shadow away from the light.
    </div>

    <div class="player">
      COM TRUISE _ PROPAGANDA<br>
      01:37 / 04:38
    </div>
  </main>

<script>
const root = document.documentElement;

window.addEventListener("mousemove", (e) => {
  const x = e.clientX;
  const y = e.clientY;

  root.style.setProperty("--x", `${x}px`);
  root.style.setProperty("--y", `${y}px`);

  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;

  const shadowX = (centerX - x) * 0.22;
  const shadowY = (centerY - y) * 0.22;

  root.style.setProperty("--shadow-x", `${shadowX}px`);
  root.style.setProperty("--shadow-y", `${shadowY}px`);
  root.style.setProperty("--shadow-skew", `${shadowX * -0.04}deg`);
  root.style.setProperty("--shadow-skew-y", `${shadowY * 0.02}deg`);
});
</script>

</body>
</html>

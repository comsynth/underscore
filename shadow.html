<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Underscore Shadow</title>

<link rel="stylesheet" href="css/styles.css">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;
  cursor: none;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(
    circle 700px at var(--x, 50%) var(--y, 50%),
    rgba(75, 111, 138, 0.03) 0%,
    rgba(75, 111, 138, 0.01) 25%,
    transparent 55%
  );
  pointer-events: none;
  z-index: 5;
  mix-blend-mode: screen;
}

.page {
  min-height: 100vh;
  padding: 48px;
  position: relative;
}

.brand {
  letter-spacing: .35em;
  font-size: 28px;
  margin-bottom: 12px;
}

.sub {
  font-size: 16px;
  opacity: .8;
}

.nav {
  margin-top: 60px;
  line-height: 1.8;
  font-size: 16px;
}

.hero-logo {
  position: absolute;
  left: 50%;
  top: 48%;
  width: 620px;
  max-width: 70vw;
  transform: translate(-50%, -50%);
}

.logo-wrap {
  position: relative;
  width: 100%;
}

.logo-shadow,
.logo-main {
  display: block;
  width: 100%;
}

.logo-shadow {
  position: absolute;
  inset: 0;
  z-index: 1;
  opacity: .10;
  filter: brightness(0);
  pointer-events: none;
  animation: shadowDrift 18s ease-in-out infinite alternate;
}

.logo-main {
  position: relative;
  z-index: 2;
  filter:
    drop-shadow(0 0 8px rgba(75, 111, 138, .5))
    drop-shadow(0 8px 10px rgba(0, 0, 0, .7));
}

@keyframes shadowDrift {
  0% {
    transform: translate(6px, 6px);
  }

  25% {
    transform: translate(8px, 7px);
  }

  50% {
    transform: translate(10px, 9px);
  }

  75% {
    transform: translate(8px, 11px);
  }

  100% {
    transform: translate(7px, 10px);
  }
}

.cursor-light {
  position: fixed;
  left: var(--x, 50%);
  top: var(--y, 50%);
  width: 16px;
  height: 16px;
  border: 1px solid rgba(75, 111, 138, .45);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 10;
}

.caption {
  position: absolute;
  left: 48px;
  bottom: 64px;
  max-width: 360px;
  opacity: .75;
  line-height: 1.6;
}

.player {
  position: absolute;
  right: 48px;
  bottom: 48px;
  font-size: 16px;
  letter-spacing: .12em;
}
</style>
</head>

<body>
  <div class="cursor-light"></div>

  <main class="page">
    <div class="brand">UNDERSCORE</div>
    <div class="sub">retro moving shadow demo</div>

    <nav class="nav">
      01 &nbsp; home<br>
      02 &nbsp; music<br>
      03 &nbsp; colors<br>
      04 &nbsp; about<br>
      05 &nbsp; contact
    </nav>

    <section class="hero-logo">
      <div class="logo-wrap">
        <img src="images/block_logo.svg" class="logo-shadow" alt="">
        <img src="images/block_logo.svg" class="logo-main" alt="Block logo">
      </div>
    </section>

    <div class="caption">
      <strong>RETRO MOVING SHADOW</strong><br>
      Move your mouse around the screen.<br>
      The logo has a subtle drifting shadow and ambient cursor glow.
    </div>

    <div class="player">
      COM TRUISE _ PROPAGANDA<br>
      01:37 / 04:38
    </div>
  </main>

<script>
const root = document.documentElement;

window.addEventListener("mousemove", (e) => {
  root.style.setProperty("--x", `${e.clientX}px`);
  root.style.setProperty("--y", `${e.clientY}px`);
});
</script>

</body>
</html>
